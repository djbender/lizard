name: CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config for GitHub Packages auth
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: false
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev
          cache-to: type=gha,scope=build-dev,mode=max

  scan-ruby:
    name: Scan Ruby
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Load cached dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev

      - name: Scan for common Rails security vulnerabilities
        run: docker compose run --rm --no-deps app bin/brakeman --no-pager

  scan-js:
    name: Scan JavaScript
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Load cached dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: docker compose run --rm --no-deps app bin/importmap audit

  lint:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Load cached dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev

      - name: Lint code for consistent style
        run: docker compose run --rm --no-deps app bin/standardrb --format github

  zeitwerk:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Load cached dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev

      - name: Check Zeitwerk eager loading
        run: docker compose run --rm zeitwerk bin/rails zeitwerk:check

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create bundle config
        run: |
          mkdir -p /tmp/secrets
          echo '---' > /tmp/secrets/bundle_config
          echo "BUNDLE_RUBYGEMS__PKG__GITHUB__COM: \"${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}\"" >> /tmp/secrets/bundle_config

      - name: Load cached dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: lizard-app:dev
          push: false
          secret-files: |
            bundle_config=/tmp/secrets/bundle_config
          cache-from: type=gha,scope=build-dev

      - name: Pull service images
        run: docker compose pull --ignore-buildable --include-deps test

      - name: Run tests
        run: >
          docker compose run --rm
          -e LIZARD_REPORT=true
          -e LIZARD_API_KEY=${{ secrets.LIZARD_API_KEY }}
          -e LIZARD_URL=${{ secrets.LIZARD_URL }}
          test bin/rails spec

      - name: Run system tests
        run: docker compose run --rm test bin/rails spec:system

      - name: Keep screenshots and videos from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-artifacts
          path: |
            tmp/capybara/screenshots
            tmp/capybara/videos
          if-no-files-found: ignore

  ci:
    if: always()
    needs: [scan-ruby, scan-js, lint, zeitwerk, test]
    runs-on: ubuntu-slim
    steps:
      - if: ${{ !success() }}
        run: exit 1

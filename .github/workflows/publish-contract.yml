name: Publish API Contract

on:
  push:
    branches: [main]
    paths:
      - "public/api/v1/openapi.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public/api/v1

      - id: deployment
        uses: actions/deploy-pages@v5
